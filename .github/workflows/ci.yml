name: CI

# Network-independent verification: Ruff, MyPy, the external-service-free test
# suite, and a clean-migration smoke check against a disposable runner-temp
# SQLite database. No secrets, no live RSS/OpenAI calls, no development
# database. See docs/DECISIONS.md ADR-025.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv and Python 3.12
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: MyPy (strict)
        run: uv run mypy .

      - name: Tests
        run: uv run pytest

      - name: Clean migration smoke (disposable runner-temp database)
        env:
          DATABASE_URL: "sqlite:///${{ runner.temp }}/ci-migration-smoke.db"
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head
